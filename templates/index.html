<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频生成器 - Google Veo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-500 to-pink-500 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🎬 AI 视频生成器</h1>
            <p class="text-white/80">基于 Google Veo 3.1 - 用文字描述生成视频</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">📝 视频描述</label>
                <textarea id="prompt" rows="4" placeholder="描述你想要生成的视频，例如：一只猫在花园玩毛线球，阳光明媚，温馨治愈场景..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">⏱️ 视频时长（秒）</label>
                    <select id="duration" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <option value="4">4 秒</option>
                        <option value="6">6 秒</option>
                        <option value="8" selected>8 秒</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">📐 画面比例</label>
                    <select id="aspectRatio" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <option value="16:9">16:9（横屏）</option>
                        <option value="9:16">9:16（竖屏）</option>
                        <option value="1:1">1:1（正方形）</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" onclick="generateVideo()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-lg hover:from-purple-700 hover:to-pink-700 transition-all transform hover:scale-105 shadow-lg">🚀 开始生成视频</button>

            <div id="status" class="mt-6 hidden">
                <div class="flex items-center justify-center mb-4">
                    <div class="loading mr-3"></div>
                    <span class="text-gray-700 font-semibold" id="statusText">正在提交任务...</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="bg-gradient-to-r from-purple-600 to-pink-600 h-2 rounded-full transition-all duration-1000" style="width: 0%" id="progressBar"></div>
                </div>
                <p class="text-gray-400 text-sm text-center mt-2">视频生成通常需要 2~4 分钟，请耐心等待 ☕</p>
            </div>

            <div id="result" class="mt-6 hidden">
                <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                    <h3 class="text-green-800 font-bold mb-2">✅ 视频生成成功！</h3>
                    <div id="videoContainer" class="mt-4"></div>
                    <a id="downloadLink" href="#" target="_blank" class="inline-block mt-4 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">📥 下载视频</a>
                </div>
            </div>

            <div id="error" class="mt-6 hidden">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <h3 class="text-red-800 font-bold">❌ 生成失败</h3>
                    <p id="errorMessage" class="text-red-600 mt-2"></p>
                </div>
            </div>
        </div>

        <div class="text-center mt-8 text-white/60 text-sm">
            <p>Powered by Google Cloud Vertex AI - Veo 3.1</p>
            <p class="mt-1">💰 使用 Google Cloud 300 美金免费额度</p>
        </div>
    </div>

    <script>
        let operationName = null;
        let checkInterval = null;

        async function generateVideo() {
            const prompt = document.getElementById('prompt').value.trim();
            const duration = parseInt(document.getElementById('duration').value);
            const aspectRatio = document.getElementById('aspectRatio').value;

            if (!prompt) {
                showError('请输入视频描述');
                return;
            }

            document.getElementById('status').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('progressBar').style.width = '5%';
            document.getElementById('statusText').textContent = '正在提交任务...';
            disableBtn();

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, duration, aspect_ratio: aspectRatio })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '提交失败');
                }

                if (data.gcs_uri || data.video_url) {
                    showResult(data);
                    resetBtn();
                    document.getElementById('status').classList.add('hidden');
                    return;
                }

                operationName = data.operation_name;
                if (!operationName) throw new Error('未获取到任务 ID');

                document.getElementById('statusText').textContent = '任务已提交，等待生成中...';
                startPolling();

            } catch (error) {
                showError(error.message);
                resetBtn();
            }
        }

        function startPolling() {
            let progress = 10;
            let elapsed = 0;
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');

            checkInterval = setInterval(async () => {
                elapsed += 8;
                try {
                    const response = await fetch(
                        '/status?operation_name=' + encodeURIComponent(operationName)
                    );
                    const data = await response.json();

                    if (data.done === false) {
                        progress = Math.min(progress + 4, 92);
                        progressBar.style.width = progress + '%';
                        statusText.textContent = `生成中... 已等待约 ${elapsed} 秒`;
                        return;
                    }

                    clearInterval(checkInterval);

                    if (!data.success) {
                        showError(data.error || '生成失败');
                        resetBtn();
                        return;
                    }

                    progressBar.style.width = '100%';
                    document.getElementById('status').classList.add('hidden');
                    showResult(data);
                    resetBtn();

                } catch (error) {
                    clearInterval(checkInterval);
                    showError('查询状态失败：' + error.message);
                    resetBtn();
                }
            }, 8000);
        }

        function showResult(data) {
            document.getElementById('result').classList.remove('hidden');
            const container = document.getElementById('videoContainer');

            if (data.video_url) {
                container.innerHTML = `
                    <video controls autoplay class="w-full max-w-md mx-auto rounded-lg shadow-lg">
                        <source src="${data.video_url}" type="video/mp4">
                        您的浏览器不支持视频播放
                    </video>
                `;
                document.getElementById('downloadLink').href = data.video_url;
            } else if (data.gcs_uri) {
                const httpUri = 'https://storage.cloud.google.com/' + data.gcs_uri.replace('gs://', '');
                container.innerHTML = `
                    <p class="text-gray-700">视频已存储在 Google Cloud Storage：</p>
                    <p class="text-purple-600 font-mono text-sm mt-2 break-all">${data.gcs_uri}</p>
                    <p class="text-gray-500 text-sm mt-2">命令行下载：</p>
                    <code class="bg-gray-100 px-3 py-2 rounded text-sm block mt-1 break-all">gcloud storage cp ${data.gcs_uri} video.mp4</code>
                `;
                document.getElementById('downloadLink').href = httpUri;
            } else {
                container.innerHTML = '<p class="text-gray-500">视频已生成，但未获取到链接。</p>';
            }
        }

        function showError(message) {
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('status').classList.add('hidden');
        }

        function disableBtn() {
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').classList.add('opacity-50');
        }

        function resetBtn() {
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').classList.remove('opacity-50');
        }
    </script>
</body>
</html>
